<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TowerOS</title>
    <link rel="stylesheet" href="desktop.css" />
  </head>
  <body>
    <div class="screen">
      <div class="window" id="window_metar" style="display: none">
        <div class="window_header" id="window_metar_header">
          <img src="../assets/icons/cloud_black.svg" alt="Cloud" />
          <p>METAR</p>
          <span class="window_close" id="metar_close">🔴</span>
        </div>
        <div class="window_content">
          <h2>METAR Fetcher</h2>
          <label for="metar_icao">METAR ICAO: </label>
          <input type="text" id="metar_input" name="metar_icao" size="2" />
          <input id="metar_submit" type="submit" value="Submit" />
          <div class="metar_response" id="metar_response">
            <p>Enter ICAO for METAR</p>
          </div>
        </div>
      </div>
      <div class="window" id="window_radar" style="display: none">
        <div class="window_header" id="window_radar_header">
          <img src="../assets/icons/radar_black.svg" alt="Cloud" />
          <p>Simradar21</p>
          <span class="window_close" id="radar_close">🔴</span>
        </div>
        <div class="window_content">
          <iframe src="https://simradar21.com" title="VATSIM Radar"></iframe>
        </div>
      </div>
      <div class="app_bar">
        <div class="app_bar_title"><strong>TowerOS</strong></div>
        <div class="app_bar_apps">
          <ul>
            <li>
              <a id="metar_open">
                <img src="../assets/icons/cloud_black.svg" alt="cloud icon" />
                <span>METAR</span>
              </a>
            </li>
            <li>
              <a id="radar_open">
                <img src="../assets/icons/radar_black.svg" alt="Radar" />
                <span>VATSIM Radar</span>
              </a>
            </li>
          </ul>
        </div>
        <div class="app_bar_clock">
          <p id="app_bar_time">16:44</p>
        </div>
      </div>
      <div class="desktop" id="desktop_apps">
        <div class="desktop_app" id="metar_app">
          <img src="../assets/icons/cloud_black.svg" alt="Cloud" />
          <p>METAR</p>
        </div>
        <div class="desktop_app" id="radar_app">
          <img src="../assets/icons/radar_black.svg" alt="Radar" />
          <p>Radar</p>
        </div>
      </div>
    </div>
    <script src="os.js"></script>
  </body>
</html>
